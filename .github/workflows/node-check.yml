name: 每日节点验证

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check-nodes:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      
      - name: 配置 Go 代理
        run: |
          go env -w GOPROXY=https://goproxy.cn,direct
      
      - name: 创建节点目录
        run: mkdir -p jiedian
      
      - name: 运行节点验证
        run: |
          cd scripts/node-checker
          go run main.go
        env:
          SUBSCRIPTION_URL: ${{ secrets.SUBSCRIPTION_URL }}
      
      - name: 提交更改
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add jiedian/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: 更新有效节点 $(date +'%Y-%m-%d')" && git push)
