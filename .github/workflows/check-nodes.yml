name: Check Nodes

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  check-nodes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false
        fetch-depth: 0
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Extract mihomo
      run: |
        gunzip -c mihomo-linux-amd64-v1.19.20.gz > mihomo
        chmod +x mihomo
        
    - name: Run node check script
      run: |
        python check_nodes.py \
          --url "https://ghproxy.net/https://raw.githubusercontent.com/Ruk1ng001/freeSub/main/clash.yaml" \
          --output "valid_nodes.txt" \
          --timeout 10 \
          --threads 20
          
    - name: Commit and push changes
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git add -f valid_nodes.txt valid_nodes.txt.b64 || true
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update valid nodes" && git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:${{ github.ref }})
